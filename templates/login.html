{% extends "base.html" %}

{% block title %}Sign In - Student Grievance Portal{% endblock %}

{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-graduation-cap" style="color: var(--primary); font-size: 32px; margin-bottom: 8px;"></i>
            <h2>Sign In</h2>
            <p style="font-size: 13px; color: var(--text-secondary);">Access the Student Grievance System</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="post" autocomplete="off">
            <div class="form-group">
                <label for="loginEmail" class="form-label">Email Address</label>
                <input type="email" name="email" id="loginEmail" class="form-control" placeholder="name@college.edu" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="loginPassword" class="form-label">Password</label>
                    <a href="{{ url_for('forgot_password') }}" style="font-size: 12px; font-weight: 500;">Forgot password?</a>
                </div>
                <div class="password-wrapper">
                    <input type="password" name="password" id="loginPassword" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                    <i class="fa-solid fa-eye password-toggle-icon" data-input-id="loginPassword"></i>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 16px;">
                <label for="loginRole" class="form-label">Sign In As</label>
                <select name="role" id="loginRole" class="form-control" required style="cursor: pointer;" autocomplete="off">
                    <option value="" disabled selected>Select your role...</option>
                    <option value="student">Student</option>
                    <option value="staff">Department Staff</option>
                    <option value="department">Complaint Authority</option>
                    <option value="warden">Hostel Warden</option>
                    <option value="principal">Principal</option>
                    <option value="admin">System Administrator</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px; padding: 12px;">Sign In</button>
        </form>
        
        <div class="auth-footer">
            <span>Don't have an account?</span>
            <a href="{{ url_for('register') }}" style="font-weight: 600;">Create account</a>
            <div style="margin-top: 12px;">
                <a href="{{ url_for('index') }}" style="font-size: 12px; color: var(--text-hint);"><i class="fa-solid fa-house"></i> Back to Homepage</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
